<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>NEXUS OS Creative Studio</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap');
    
    * { font-family: 'Inter', sans-serif; }
    body { background: #050507; color: #f8fafc; }
    
    ::-webkit-scrollbar { width: 6px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.1); border-radius: 3px; }
    
    .glass { background: rgba(10,10,15,0.95); backdrop-filter: blur(20px); border: 1px solid rgba(255,255,255,0.08); }
    
    .nav-item { transition: all 0.2s; }
    .nav-item:hover { background: rgba(255,255,255,0.05); }
    .nav-item.active { background: rgba(168,85,247,0.2); color: #a855f7; }
    
    .btn-primary {
      background: linear-gradient(135deg, #a855f7 0%, #ec4899 100%);
      transition: all 0.3s;
    }
    .btn-primary:hover { transform: translateY(-2px); box-shadow: 0 10px 30px rgba(168,85,247,0.4); }
    .btn-primary:disabled { opacity: 0.5; cursor: not-allowed; transform: none; }
    
    .input-field {
      background: rgba(255,255,255,0.05);
      border: 1px solid rgba(255,255,255,0.1);
      transition: all 0.2s;
    }
    .input-field:focus {
      outline: none;
      border-color: #a855f7;
      box-shadow: 0 0 20px rgba(168,85,247,0.2);
    }
    
    .card { background: rgba(20,20,25,0.6); border: 1px solid rgba(255,255,255,0.08); backdrop-filter: blur(10px); }
    
    .slide-container { transition: transform 0.3s ease-out; }
    
    @keyframes spin { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }
    .animate-spin { animation: spin 1s linear infinite; }
    
    .line-clamp-2 { display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; }
  </style>
</head>
<body class="h-screen overflow-hidden">
  <div id="app" class="flex h-full">
    <!-- Sidebar -->
    <aside id="sidebar" class="w-60 h-full glass flex flex-col p-6 z-50 fixed left-0 top-0 transition-transform duration-300 md:translate-x-0 -translate-x-full">
      <div class="text-lg font-bold mb-8 flex items-center gap-2">
        <span class="w-2 h-2 bg-indigo-400 rounded-full shadow-[0_0_10px_#818cf8]"></span>
        NEXUS OS
      </div>
      
      <nav class="flex flex-col gap-1">
        <div class="nav-item active rounded-lg px-3 py-2.5 cursor-pointer flex items-center gap-3" data-nav="create">
          <svg width="18" height="18" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M12 5v14m-7-7h14"/></svg>
          Create Image
        </div>
        <div class="nav-item rounded-lg px-3 py-2.5 cursor-pointer flex items-center gap-3" data-nav="database">
          <svg width="18" height="18" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M4 7v10c0 2 4 4 8 4s8-2 8-4V7M4 7c0 2 4 4 8 4s8-2 8-4M4 7c0-2 4-4 8-4s8 2 8 4"/></svg>
          Database
        </div>
        <div class="nav-item rounded-lg px-3 py-2.5 cursor-pointer flex items-center gap-3" data-nav="chat">
          <svg width="18" height="18" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M21 15a2 2 0 01-2 2H7l-4 4V5a2 2 0 012-2h14a2 2 0 012 2z"/></svg>
          AI Chat
        </div>
        <div class="nav-item rounded-lg px-3 py-2.5 cursor-pointer flex items-center gap-3" data-nav="youtube">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="currentColor"><path d="M23.498 6.186a3.016 3.016 0 0 0-2.122-2.136C19.505 3.545 12 3.545 12 3.545s-7.505 0-9.377.505A3.017 3.017 0 0 0 .502 6.186C0 8.07 0 12 0 12s0 3.93.502 5.814a3.016 3.016 0 0 0 2.122 2.136c1.871.505 9.376.505 9.376.505s7.505 0 9.377-.505a3.015 3.015 0 0 0 2.122-2.136C24 15.93 24 12 24 12s0-3.93-.502-5.814zM9.545 15.568V8.432L15.818 12l-6.273 3.568z"/></svg>
          YouTube
        </div>
        <div class="nav-item rounded-lg px-3 py-2.5 cursor-pointer flex items-center gap-3" data-nav="tiktok">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="currentColor"><path d="M19.59 6.69a4.83 4.83 0 0 1-3.77-4.25V2h-3.45v13.67a2.89 2.89 0 0 1-5.2 1.74 2.89 2.89 0 0 1 2.31-4.64 2.93 2.93 0 0 1 .88.13V9.4a6.84 6.84 0 0 0-1-.05A6.33 6.33 0 0 0 5 20.1a6.34 6.34 0 0 0 10.86-4.43v-7a8.16 8.16 0 0 0 4.77 1.52v-3.4a4.85 4.85 0 0 1-1-.1z"/></svg>
          TikTok
        </div>
      </nav>
    </aside>
    
    <!-- Main Content -->
    <main class="flex-1 md:ml-60 h-full overflow-y-auto p-4 md:p-6">
      <button id="menuBtn" class="md:hidden fixed top-4 left-4 z-40 p-2 rounded-lg glass">
        <svg width="20" height="20" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M4 6h16M4 12h16M4 18h16"/></svg>
      </button>
      
      <!-- Create Section -->
      <section id="create-section" class="section">
        <h2 class="text-2xl font-semibold mb-6">AI Image Generation</h2>
        <div class="card rounded-2xl p-6">
          <textarea id="prompt-input" class="input-field w-full h-32 rounded-xl p-4 resize-none mb-4 text-white" placeholder="Describe the image you want to create..."></textarea>
          <div class="flex flex-wrap gap-2 mb-4">
            <button class="style-btn px-3 py-1.5 rounded-full bg-white/10 text-sm hover:bg-purple-500/30 transition-all" data-style="realistic">Realistic</button>
            <button class="style-btn px-3 py-1.5 rounded-full bg-white/10 text-sm hover:bg-purple-500/30 transition-all" data-style="anime">Anime</button>
            <button class="style-btn px-3 py-1.5 rounded-full bg-white/10 text-sm hover:bg-purple-500/30 transition-all" data-style="digital art">Digital Art</button>
            <button class="style-btn px-3 py-1.5 rounded-full bg-white/10 text-sm hover:bg-purple-500/30 transition-all" data-style="3d render">3D Render</button>
            <button class="style-btn px-3 py-1.5 rounded-full bg-white/10 text-sm hover:bg-purple-500/30 transition-all" data-style="watercolor">Watercolor</button>
          </div>
          <button id="generate-btn" class="btn-primary w-full py-3 rounded-xl font-medium text-white">Generate Image</button>
        </div>
        <div id="generated-result" class="mt-6 hidden">
          <div class="card rounded-2xl p-4">
            <img id="generated-image" class="w-full rounded-xl mb-4" src="" alt="Generated">
            <p id="generated-prompt" class="text-sm text-white/50 mb-4"></p>
            <div class="flex gap-2">
              <button id="save-btn" class="flex-1 py-2 rounded-lg bg-green-500/20 text-green-400 hover:bg-green-500/30 transition-all">Save</button>
              <button id="download-btn" class="flex-1 py-2 rounded-lg bg-blue-500/20 text-blue-400 hover:bg-blue-500/30 transition-all">Download</button>
            </div>
          </div>
        </div>
      </section>
      
      <!-- Database Section -->
      <section id="database-section" class="section hidden">
        <h2 class="text-2xl font-semibold mb-6">Image Database</h2>
        <div id="image-grid" class="grid grid-cols-2 md:grid-cols-3 lg:grid-cols-4 gap-4"></div>
        <div id="empty-db" class="card rounded-2xl p-12 text-center text-white/50">No images saved yet.</div>
      </section>
      
      <!-- Chat Section -->
      <section id="chat-section" class="section hidden">
        <h2 class="text-2xl font-semibold mb-6">AI Chat</h2>
        <div class="card rounded-2xl flex flex-col" style="height: calc(100vh - 180px);">
          <div id="chat-messages" class="flex-1 overflow-y-auto p-4 space-y-4">
            <div class="flex gap-3">
              <div class="w-8 h-8 rounded-full bg-gradient-to-br from-purple-500 to-pink-500 flex items-center justify-center text-sm flex-shrink-0">AI</div>
              <div class="flex-1 bg-white/5 rounded-xl p-3">Hello! How can I help you?</div>
            </div>
          </div>
          <div class="p-4 border-t border-white/10">
            <div class="flex gap-2">
              <input id="chat-input" type="text" class="input-field flex-1 rounded-xl px-4 py-3 text-white" placeholder="Type your message...">
              <button id="send-btn" class="btn-primary px-6 rounded-xl">Send</button>
            </div>
          </div>
        </div>
      </section>
      
      <!-- YouTube Section -->
      <section id="youtube-section" class="section hidden">
        <h2 class="text-2xl font-semibold mb-6">YouTube Search</h2>
        <div class="flex gap-2 mb-6">
          <input id="yt-search" type="text" class="input-field flex-1 rounded-xl px-4 py-3 text-white" placeholder="Search YouTube...">
          <button id="yt-search-btn" class="btn-primary px-6 rounded-xl">Search</button>
        </div>
        <div id="yt-loading" class="hidden text-center py-8">
          <div class="animate-spin w-8 h-8 border-2 border-purple-500 border-t-transparent rounded-full mx-auto mb-2"></div>
        </div>
        <div id="yt-results" class="grid grid-cols-1 md:grid-cols-2 gap-4"></div>
      </section>
      
      <!-- TikTok Section -->
      <section id="tiktok-section" class="section hidden">
        <h2 class="text-2xl font-semibold mb-6">TikTok Shorts</h2>
        <div class="flex gap-2 mb-6">
          <input id="tt-search" type="text" class="input-field flex-1 rounded-xl px-4 py-3 text-white" placeholder="Search TikTok...">
          <button id="tt-search-btn" class="btn-primary px-6 rounded-xl">Search</button>
        </div>
        <div id="tt-loading" class="hidden text-center py-8">
          <div class="animate-spin w-8 h-8 border-2 border-purple-500 border-t-transparent rounded-full mx-auto mb-2"></div>
        </div>
        <div id="tt-results" class="grid gap-3"></div>
      </section>
    </main>
    
    <!-- YouTube Player -->
    <div id="yt-player" class="fixed inset-0 z-50 bg-black/90 hidden flex items-center justify-center">
      <button id="yt-close" class="absolute top-4 right-4 text-white text-3xl hover:text-white/70 z-10">&times;</button>
      <iframe id="yt-iframe" class="w-full h-full max-w-5xl max-h-[80vh] aspect-video" frameborder="0" allow="autoplay; fullscreen" allowfullscreen></iframe>
    </div>
    
    <!-- TikTok Player -->
    <div id="tt-player" class="fixed inset-0 z-50 bg-black hidden overflow-hidden">
      <div id="tt-slide-container" class="w-full h-full slide-container"></div>
      <div id="tt-overlay" class="absolute inset-0 z-10" style="touch-action: none;"></div>
    </div>
  </div>

  <script>
    let currentNav = 'create';
    let selectedStyle = 'realistic';
    let imageDatabase = [];
    let currentGeneratedImage = null;
    let tiktokVideos = [];
    let currentVideoIndex = 0;
    let touchStartY = 0;
    let lastWheelTime = 0;
    
    const API_BASE = window.location.origin;
    
    const sidebar = document.getElementById('sidebar');
    const menuBtn = document.getElementById('menuBtn');
    const navItems = document.querySelectorAll('.nav-item');
    const sections = document.querySelectorAll('.section');
    
    async function loadDatabaseFromServer() {
      try {
        const res = await fetch(`${API_BASE}/api/images`);
        const data = await res.json();
        imageDatabase = data.images || [];
        renderDatabase();
      } catch (e) { 
        console.error('Load database error:', e);
        renderDatabase(); 
      }
    }
    
    navItems.forEach(item => {
      item.addEventListener('click', () => {
        const nav = item.dataset.nav;
        currentNav = nav;
        navItems.forEach(n => n.classList.remove('active'));
        item.classList.add('active');
        sections.forEach(s => s.classList.add('hidden'));
        document.getElementById(`${nav}-section`).classList.remove('hidden');
        sidebar.classList.add('-translate-x-full');
      });
    });
    
    menuBtn.addEventListener('click', () => sidebar.classList.toggle('-translate-x-full'));
    
    document.querySelectorAll('.style-btn').forEach(btn => {
      btn.addEventListener('click', () => {
        selectedStyle = btn.dataset.style;
        document.querySelectorAll('.style-btn').forEach(b => b.classList.remove('bg-purple-500/50'));
        btn.classList.add('bg-purple-500/50');
      });
    });
    
    document.getElementById('generate-btn').addEventListener('click', async () => {
      const prompt = document.getElementById('prompt-input').value.trim();
      if (!prompt) return alert('Please enter a prompt');
      
      const btn = document.getElementById('generate-btn');
      btn.innerHTML = '<span class="animate-spin inline-block w-5 h-5 border-2 border-white border-t-transparent rounded-full"></span> Generating...';
      btn.disabled = true;
      
      try {
        const res = await fetch(`${API_BASE}/api/generate-image`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ prompt, style: selectedStyle })
        });
        const data = await res.json();
        
        if (data.success && data.image) {
          currentGeneratedImage = { 
            imageUrl: data.image, 
            prompt, 
            style: selectedStyle
          };
          document.getElementById('generated-image').src = data.image;
          document.getElementById('generated-prompt').textContent = prompt;
          document.getElementById('generated-result').classList.remove('hidden');
        } else alert('Failed: ' + (data.error || 'Unknown error'));
      } catch (e) { 
        console.error('Generate error:', e);
        alert('Failed to generate image'); 
      }
      
      btn.innerHTML = 'Generate Image';
      btn.disabled = false;
    });
    
    document.getElementById('save-btn').addEventListener('click', async () => {
      if (!currentGeneratedImage) return;
      try {
        const res = await fetch(`${API_BASE}/api/images`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify(currentGeneratedImage)
        });
        const data = await res.json();
        if (data.success) { 
          alert('Saved!'); 
          loadDatabaseFromServer(); 
        } else alert('Failed to save: ' + (data.error || 'Unknown error'));
      } catch (e) { 
        console.error('Save error:', e);
        alert('Failed to save'); 
      }
    });
    
    document.getElementById('download-btn').addEventListener('click', () => {
      if (!currentGeneratedImage) return;
      const a = document.createElement('a');
      a.href = currentGeneratedImage.imageUrl;
      a.download = `nexus-${Date.now()}.png`;
      a.click();
    });
    
    function renderDatabase() {
      const grid = document.getElementById('image-grid');
      const empty = document.getElementById('empty-db');
      if (imageDatabase.length === 0) { 
        grid.innerHTML = ''; 
        empty.classList.remove('hidden'); 
        return; 
      }
      empty.classList.add('hidden');
      grid.innerHTML = imageDatabase.map(img => `
        <div class="card rounded-xl overflow-hidden group relative">
          <img src="${img.imageUrl}" class="w-full aspect-square object-cover" alt="${img.prompt}">
          <div class="p-2">
            <p class="text-xs text-white/70 line-clamp-2">${img.prompt}</p>
            <p class="text-xs text-white/30 mt-1">${img.style || ''}</p>
          </div>
          <div class="absolute inset-0 bg-black/50 opacity-0 group-hover:opacity-100 transition-all flex items-center justify-center gap-2">
            <button onclick="downloadImage('${img.imageUrl}')" class="p-2 rounded-full bg-white/20 hover:bg-white/30 text-white">↓</button>
            <button onclick="deleteImage('${img.id}')" class="p-2 rounded-full bg-red-500/20 hover:bg-red-500/30 text-red-400">×</button>
          </div>
        </div>
      `).join('');
    }
    
    window.downloadImage = (url) => { 
      const a = document.createElement('a'); 
      a.href = url; 
      a.download = `nexus-${Date.now()}.png`; 
      a.click(); 
    };
    
    window.deleteImage = async (id) => {
      if (!confirm('Delete this image?')) return;
      try { 
        await fetch(`${API_BASE}/api/images?id=${id}`, { method: 'DELETE' }); 
        loadDatabaseFromServer(); 
      } catch (e) {
        console.error('Delete error:', e);
      }
    };
    
    document.getElementById('send-btn').addEventListener('click', sendChatMessage);
    document.getElementById('chat-input').addEventListener('keypress', (e) => { if (e.key === 'Enter') sendChatMessage(); });
    
    async function sendChatMessage() {
      const input = document.getElementById('chat-input');
      const msg = input.value.trim();
      if (!msg) return;
      
      const container = document.getElementById('chat-messages');
      container.innerHTML += `<div class="flex gap-3 justify-end"><div class="bg-purple-500/20 rounded-xl p-3 max-w-[80%]">${escapeHtml(msg)}</div><div class="w-8 h-8 rounded-full bg-white/10 flex items-center justify-center text-sm flex-shrink-0">You</div></div>`;
      input.value = '';
      
      const typingId = 'typing-' + Date.now();
      container.innerHTML += `<div id="${typingId}" class="flex gap-3"><div class="w-8 h-8 rounded-full bg-gradient-to-br from-purple-500 to-pink-500 flex items-center justify-center text-sm flex-shrink-0">AI</div><div class="flex-1 bg-white/5 rounded-xl p-3">Thinking...</div></div>`;
      container.scrollTop = container.scrollHeight;
      
      try {
        const res = await fetch(`${API_BASE}/api/chat`, { 
          method: 'POST', 
          headers: { 'Content-Type': 'application/json' }, 
          body: JSON.stringify({ message: msg }) 
        });
        const data = await res.json();
        document.getElementById(typingId)?.remove();
        container.innerHTML += `<div class="flex gap-3"><div class="w-8 h-8 rounded-full bg-gradient-to-br from-purple-500 to-pink-500 flex items-center justify-center text-sm flex-shrink-0">AI</div><div class="flex-1 bg-white/5 rounded-xl p-3">${escapeHtml(data.response || data.error || 'Error')}</div></div>`;
      } catch (e) { 
        document.getElementById(typingId)?.remove();
        container.innerHTML += `<div class="flex gap-3"><div class="w-8 h-8 rounded-full bg-gradient-to-br from-purple-500 to-pink-500 flex items-center justify-center text-sm flex-shrink-0">AI</div><div class="flex-1 bg-white/5 rounded-xl p-3 text-red-400">Connection error</div></div>`;
      }
      container.scrollTop = container.scrollHeight;
    }
    
    function escapeHtml(text) {
      const div = document.createElement('div');
      div.textContent = text;
      return div.innerHTML;
    }
    
    document.getElementById('yt-search-btn').addEventListener('click', searchYouTube);
    document.getElementById('yt-search').addEventListener('keypress', (e) => { if (e.key === 'Enter') searchYouTube(); });
    
    async function searchYouTube() {
      const query = document.getElementById('yt-search').value.trim();
      if (!query) return;
      document.getElementById('yt-loading').classList.remove('hidden');
      document.getElementById('yt-results').innerHTML = '';
      
      try {
        const res = await fetch(`${API_BASE}/api/youtube-search?q=${encodeURIComponent(query)}`);
        const data = await res.json();
        if (data.videos && data.videos.length > 0) {
          document.getElementById('yt-results').innerHTML = data.videos.map(v => `
            <div class="card rounded-xl overflow-hidden cursor-pointer hover:border-purple-500/50 transition-all" onclick="playYouTube('${v.id}')">
              <div class="aspect-video bg-gradient-to-br from-purple-500/20 to-pink-500/20 flex items-center justify-center relative overflow-hidden">
                <img src="${v.thumbnail || ''}" class="w-full h-full object-cover absolute inset-0" onerror="this.style.display='none'">
                <svg width="48" height="48" viewBox="0 0 24 24" fill="white" class="relative z-10"><path d="M8 5v14l11-7z"/></svg>
              </div>
              <div class="p-3"><h4 class="font-medium line-clamp-2">${escapeHtml(v.title)}</h4><p class="text-sm text-white/50 mt-1">${escapeHtml(v.channel || '')}</p></div>
            </div>
          `).join('');
        } else document.getElementById('yt-results').innerHTML = '<div class="col-span-2 text-center py-8 text-white/50">No results</div>';
      } catch (e) { 
        console.error('YouTube search error:', e);
        document.getElementById('yt-results').innerHTML = '<div class="col-span-2 text-center py-8 text-red-400">Search error</div>'; 
      }
      document.getElementById('yt-loading').classList.add('hidden');
    }
    
    window.playYouTube = (id) => { 
      document.getElementById('yt-iframe').src = `https://www.youtube.com/embed/${id}?autoplay=1`; 
      document.getElementById('yt-player').classList.remove('hidden'); 
    };
    
    document.getElementById('yt-close').addEventListener('click', () => { 
      document.getElementById('yt-player').classList.add('hidden'); 
      document.getElementById('yt-iframe').src = ''; 
    });
    
    document.getElementById('tt-search-btn').addEventListener('click', searchTikTok);
    document.getElementById('tt-search').addEventListener('keypress', (e) => { if (e.key === 'Enter') searchTikTok(); });
    
    async function searchTikTok() {
      const query = document.getElementById('tt-search').value.trim();
      if (!query) return;
      document.getElementById('tt-loading').classList.remove('hidden');
      document.getElementById('tt-results').innerHTML = '';
      
      try {
        const res = await fetch(`${API_BASE}/api/tiktok-search?q=${encodeURIComponent(query)}`);
        const data = await res.json();
        if (data.videos && data.videos.length > 0) {
          tiktokVideos = data.videos;
          document.getElementById('tt-results').innerHTML = tiktokVideos.map((v, i) => `
            <div class="card rounded-xl p-3 flex gap-3 cursor-pointer hover:border-purple-500/50 transition-all" onclick="openTikTokPlayer(${i})">
              <div class="w-16 h-20 rounded-lg bg-gradient-to-br from-pink-500 to-red-500 flex items-center justify-center flex-shrink-0">
                <svg width="24" height="24" viewBox="0 0 24 24" fill="white"><path d="M8 5v14l11-7z"/></svg>
              </div>
              <div class="flex-1 min-w-0"><h4 class="font-medium line-clamp-2 text-sm">${escapeHtml(v.title)}</h4><p class="text-xs text-white/50 mt-1">@${escapeHtml(v.author)}</p></div>
            </div>
          `).join('');
        } else document.getElementById('tt-results').innerHTML = '<div class="text-center py-8 text-white/50">No results</div>';
      } catch (e) { 
        console.error('TikTok search error:', e);
        document.getElementById('tt-results').innerHTML = '<div class="text-center py-8 text-red-400">Search error</div>'; 
      }
      document.getElementById('tt-loading').classList.add('hidden');
    }
    
    window.openTikTokPlayer = (index) => { 
      currentVideoIndex = index; 
      document.getElementById('tt-player').classList.remove('hidden'); 
      renderTikTokVideos(); 
    };
    
    function renderTikTokVideos() {
      document.getElementById('tt-slide-container').innerHTML = tiktokVideos.map((v, i) => `
        <div class="w-full h-full absolute" style="top: ${i * 100}%">
          <iframe src="${v.embedUrl}?autoplay=1" class="w-full h-full" style="border:none" allow="autoplay; fullscreen; encrypted-media"></iframe>
        </div>
      `).join('');
      document.getElementById('tt-slide-container').style.transform = `translateY(-${currentVideoIndex * 100}%)`;
    }
    
    document.getElementById('tt-overlay').addEventListener('touchstart', (e) => { touchStartY = e.touches[0].clientY; });
    document.getElementById('tt-overlay').addEventListener('touchend', (e) => {
      const diff = touchStartY - e.changedTouches[0].clientY;
      if (diff > 50 && currentVideoIndex < tiktokVideos.length - 1) { currentVideoIndex++; renderTikTokVideos(); }
      else if (diff < -50 && currentVideoIndex > 0) { currentVideoIndex--; renderTikTokVideos(); }
    });
    document.getElementById('tt-overlay').addEventListener('wheel', (e) => {
      const now = Date.now();
      if (now - lastWheelTime < 500) return;
      if (e.deltaY > 50 && currentVideoIndex < tiktokVideos.length - 1) { lastWheelTime = now; currentVideoIndex++; renderTikTokVideos(); }
      else if (e.deltaY < -50 && currentVideoIndex > 0) { lastWheelTime = now; currentVideoIndex--; renderTikTokVideos(); }
    });
    
    document.addEventListener('keydown', (e) => {
      if (e.key === 'Escape') {
        if (!document.getElementById('tt-player').classList.contains('hidden')) { 
          document.getElementById('tt-player').classList.add('hidden'); 
          document.getElementById('tt-slide-container').innerHTML = ''; 
        }
        if (!document.getElementById('yt-player').classList.contains('hidden')) { 
          document.getElementById('yt-player').classList.add('hidden'); 
          document.getElementById('yt-iframe').src = ''; 
        }
      }
      if (!document.getElementById('tt-player').classList.contains('hidden')) {
        if (e.key === 'ArrowUp' && currentVideoIndex > 0) { currentVideoIndex--; renderTikTokVideos(); }
        if (e.key === 'ArrowDown' && currentVideoIndex < tiktokVideos.length - 1) { currentVideoIndex++; renderTikTokVideos(); }
      }
    });
    
    loadDatabaseFromServer();
    document.querySelector('.style-btn').classList.add('bg-purple-500/50');
  </script>
</body>
</html>
