services:
  - type: web
    name: nexus-os
    runtime: docker
    dockerfilePath: ./Dockerfile
    plan: free
    healthCheckPath: /api/health
    envVars:
      - key: DATABASE_URL
        sync: false
      - key: NODE_ENV
        value: production
      - key: NEXT_TELEMETRY_DISABLED
        value: "1"
      - key: ZAI_API_URL
        value: "https://root-cadillac-attractive-dream.trycloudflare.com/v1"
